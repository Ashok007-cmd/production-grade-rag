services:
  chroma:
    image: chromadb/chroma:latest
    container_name: rag-chromadb
    volumes:
      - chroma_data:/chroma/chroma
    # No host port mapping: Chroma is reachable only over the internal
    # Docker network (by the `api` service, via RAG_CHROMA_HOST=chroma).
    # A published host port here would expose Chroma's unauthenticated
    # REST API directly to the network, bypassing the API service's
    # optional bearer-auth entirely (see chromadb PYSEC-2026-311 —
    # pre-auth code execution via crafted collection/embedding-function
    # requests). If external Chroma access is ever required, re-add a
    # port mapping AND enable CHROMA_SERVER_AUTHN_PROVIDER/CREDENTIALS.
    environment:
      - ANONYMIZED_TELEMETRY=False
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-api
    ports:
      - "8000:8000"
    environment:
      - RAG_CHROMA_HOST=chroma
      - RAG_CHROMA_PORT=8000
      - RAG_LLM_PROVIDER=openai
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - ./data:/app/data
    depends_on:
      chroma:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  chroma_data:
